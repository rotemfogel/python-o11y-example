services:
  postgres:
    image: postgres:16
    container_name: postgres
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: o11y
    #      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U app -d o11y" ]
      interval: 10s
      timeout: 5s
      retries: 5

  migrate:
    image: postgres:16
    container_name: migrate
    environment:
      PGPASSWORD: app
    volumes:
      - ./migrations:/migrations:ro
    entrypoint: >
      sh -c "
        until pg_isready -h postgres -U app -d o11y; do sleep 1; done &&
        psql postgresql://app:app@postgres:5432/o11y -f /migrations/001_create_users_table.sql
      "
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

  victoria-metrics:
    image: victoriametrics/victoria-metrics:latest
    container_name: victoria-metrics
    ports:
      - "8428:8428"
    volumes:
      - vm_data:/victoria-metrics-data
    command:
      - -retentionPeriod=1
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://127.0.0.1:8428/health || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5

  victoria-logs:
    image: victoriametrics/victoria-logs:latest
    container_name: victoria-logs
    ports:
      - "9428:9428"
    volumes:
      - vl_data:/victoria-logs-data
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://127.0.0.1:9428/health || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: otel-collector
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
    volumes:
      - ./otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml:ro
    depends_on:
      victoria-metrics:
        condition: service_healthy
      victoria-logs:
        condition: service_healthy

  app:
    build: .
    image: o11y-app
    container_name: app
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://app:app@postgres:5432/o11y
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_SERVICE_NAME: o11y
    depends_on:
      migrate:
        condition: service_completed_successfully
      otel-collector:
        condition: service_started

volumes:
  postgres_data:
  vm_data:
  vl_data:
